<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yellowtail&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Varjoy — Open your mind</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Pacifico&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-dark:  #3B1F6E;
      --purple-mid:   #6B3FA0;
      --purple-light: #C4A8E8;
      --purple-pale:  #EDE4F8;
      --yellow:       #F5D97A;
      --yellow-bg:    #FDF3C8;
      --white:        #FFFFFF;
      --text-dark:    #2D1B4E;
      --text-mid:     #5C3D8F;
      --bubble-joy:   #D4B8F0;
      --bubble-user:  #F5D97A;
      --bg-chat:      #FDF8FF;
    }

    body {
        font-family: 'Nunito', sans-serif;
        background: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100%;
        overflow: hidden;
    }

    .phone {
        width: 100%;
        max-width: 393px;
        height: 100dvh;
        background: var(--white);
        overflow: hidden;
        position: relative;
        display: flex;
        flex-direction: column;
    }

    @media (min-width:768px){
      body { background:#f0e8ff; }
      .phone {
        max-width:393px;
        height:100dvh;
        border-radius:40px;
        box-shadow:0 30px 80px rgba(59,31,110,.25);
      }
    }

    .screen {
      position: absolute;
      inset: 0;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
    }

    /* ===================== LANDING ===================== */
    #screen-landing {
        background: #AAB2D8;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding: 40px 24px;
        overflow: hidden;
    }

    .landing-rays {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 55%;
      overflow: hidden;
    }
    .landing-rays svg { width: 100%; height: 100%; }

    .landing-headline {
        font-size:20px;
        font-weight:800;
        color:white;
        margin-bottom:-8px;
    }

    .landing-logo {
        font-family:'Yellowtail', cursive;
        font-size:95px;
        color:#F5D97A;
        position:relative;
        top:10px;
    }

    .btn-start {
      background: var(--white);
      color: var(--purple-dark);
      border: none;
      border-radius: 100px;
      padding: 14px 48px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,0.2); }
    .btn-start:active { transform: translateY(0); }

    .landing-character {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 140%;
        max-width: 600px;
        height: auto;
        z-index: 1;
        pointer-events: none;
    }

    .landing-top {
        position:absolute;
        top:20px;
        left:50%;
        transform:translateX(-50%);
        text-align:center;
        z-index:5;
        width:100%;
    }

    .landing-center {
        display:flex;
        justify-content:center;
        align-items:center;
        width:100%;
        margin-top:-40px;
    }

    .landing-bottom {
        position:absolute;
        left:50%;
        transform:translateX(-50%);
        z-index:10;
        top: 30%;
    }

    .landing-headline {
        font-size:20px;
        font-weight:800;
        color:white;
        margin-bottom:6px;
    }

    .landing-logo {
        font-family:'Yellowtail', cursive;
        font-size:72px;
        color:#F5D97A;
        line-height:1;
        text-shadow:0 4px 8px rgba(0,0,0,.2);
        margin-bottom:0;
    }

    .btn-start { width:230px; height:52px; font-size:18px; }

    /* ===================== NAME INPUT ===================== */
    #screen-name {
        background:#FDF3C8;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:24px;
    }

    .name-card {
        background:rgb(123, 181, 149);
        width:100%;
        border-radius:32px;
        padding:32px 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,.08);
    }

    .name-emoji { font-size: 56px; line-height: 1; }

    .name-title {
      font-size: 26px;
      font-weight: 800;
      color: var(--text-dark);
      text-align: center;
      line-height: 1.3;
    }

    .name-subtitle {
      font-size: 15px;
      color: var(--text-mid);
      text-align: center;
      line-height: 1.6;
    }

    .name-input {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid var(--purple-light);
      border-radius: 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text-dark);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }
    .name-input:focus { border-color: var(--purple-mid); }
    .name-input::placeholder { color: #bbb; font-weight: 400; }

    .name-avatar {
        width:90px;
        height:90px;
        border-radius:24px;
        object-fit:cover;
        margin-bottom:16px;
        padding:18px 24px;
    }

    .btn-continue {
      width: 100%;
      background: #6B3FA0;
      color: var(--white);
      border: none;
      border-radius: 999px;
      padding: 16px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }
    .btn-continue:hover { background: var(--purple-dark); transform: translateY(-1px); }
    .btn-continue:active { transform: translateY(0); }

    /* ===================== CHAT ===================== */
    #screen-chat {
      background: var(--yellow-bg);
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    .chat-header {
        background: #F5E08C;
        padding: 18px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid rgba(0,0,0,.05);
        flex-shrink: 0;
    }

    .chat-back {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dark);
      font-size: 18px;
      padding: 4px;
      display: flex;
      align-items: center;
    }

    .chat-avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid white;
    }

    .chat-name {
      font-size: 17px;
      font-weight: 800;
      color: var(--text-dark);
      flex: 1;
    }

    .chat-settings {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--text-mid);
    }

    .chat-messages {
      flex: 1;
      min-height: 0;
      -webkit-overflow-scrolling: touch;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--bg-chat);
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 0; }

    .bubble {
        max-width: 75%;
        padding: 12px 16px;
        border-radius: 18px;
        font-size: 13px;
        line-height: 1.6;
        font-weight: 600;
        word-break: break-word;
        box-shadow: 0 2px 10px rgba(0,0,0,.05);
    }

    .bubble-joy {
        background: #B89BE2;
        color: white;
        border-bottom-left-radius:6px;
    }

    .bubble-user {
      background: var(--bubble-user);
      color: var(--text-dark);
      align-self: flex-end;
      border-bottom-right-radius: 6px;
    }

    .bubble-typing {
      background: var(--bubble-joy);
      color: var(--text-mid);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      font-style: italic;
      font-size: 13px;
      display: none;
    }
    .bubble-typing.visible { display: block; }

    .typing-dots span {
      display: inline-block;
      animation: bounce 1.2s infinite;
      font-style: normal;
      font-size: 18px;
      line-height: 1;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    .chat-input-area {
      background: var(--yellow-bg);
      padding: 12px 16px 20px;
      border-top: 1px solid rgba(245,217,122,0.6);
      flex-shrink: 0;
    }

    .chat-input-box {
        background: white;
        border-radius: 30px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        box-shadow: 0 4px 16px rgba(107,63,160,.08);
    }

    .chat-input {
      flex: 1;
      border: none;
      outline: none;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark);
      background: transparent;
      resize: none;
      max-height: 100px;
      line-height: 1.5;
    }

    .chat-input::placeholder { color: #bbb; font-weight: 400; }

    /* Mic button */
    .btn-mic {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-mid);
      font-size: 18px;
      transition: color 0.2s, transform 0.15s;
      flex-shrink: 0;
    }

    .btn-mic:hover { color: var(--purple-mid); }

    .btn-mic.recording {
      color: #e53935;
      animation: pulse-mic 1s infinite;
    }

    @keyframes pulse-mic {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .chat-send {
      width: 42px;
      height: 42px;
      background: var(--purple-mid);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }

    .chat-send:hover { background: var(--purple-dark); transform: scale(1.05); }
    .chat-send:active { transform: scale(0.95); }
    .chat-send:disabled { background: #ccc; cursor: not-allowed; transform: none; }

    .chat-user-info {
        flex:1;
        display:flex;
        flex-direction:column;
    }

    .chat-title {
        font-size:18px;
        font-weight:800;
        color:var(--text-dark);
    }

    .chat-subtitle {
        font-size:12px;
        color:var(--text-mid);
        font-weight:600;
    }

  </style>
</head>
<body>

<div class="phone">

  <!-- ===== LANDING ===== -->
  <div id="screen-landing" class="screen">
    <div class="landing-top">
        <p class="landing-headline">Open your mind with</p>
        <h1 class="landing-logo">Varjoy</h1>
    </div>

    <div class="landing-center">
        <img src="homeVarjoy.png" class="landing-character" alt="Varjoy" />
    </div>

    <div class="landing-bottom">
        <button class="btn-start" onclick="showScreen('name')">Get Started</button>
    </div>
  </div>

  <!-- ===== NAME INPUT ===== -->
  <div id="screen-name" class="screen hidden">
    <div class="name-card">
        <div class="name-emoji">🐻</div>
        <h2 class="name-title">heyy! nama kamu siapaaa? 🐻</h2>
        <p class="name-subtitle">Joy pengen kenalan dulu sebelum nemenin hari kamu 💛</p>
        <input
          id="input-name"
          class="name-input"
          type="text"
          placeholder="Aku manggil kamu siapa nih? 🌷"
          maxlength="30"
          autocomplete="off"
        />
        <button class="btn-continue" onclick="startChat()">Mulai ngobrol sama Joy →</button>
    </div>
  </div>

  <!-- ===== CHAT ===== -->
  <div id="screen-chat" class="screen hidden">
    <div class="chat-header">
      <button class="chat-back" onclick="showScreen('landing')">←</button>
      <img src="bruanagJOY.png" class="chat-avatar" alt="Joy" />
      <div class="chat-user-info">
          <div class="chat-title">Joy</div>
          <div class="chat-subtitle" id="chat-greeting">Hi 👋</div>
      </div>
      <button class="chat-settings" onclick="resetChat()" title="Reset chat">↺</button>
    </div>

    <div class="chat-messages" id="chat-messages">
      <div class="bubble bubble-typing" id="typing-indicator">
        <span class="typing-dots">
          <span>•</span><span>•</span><span>•</span>
        </span>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="chat-input-box">
        <textarea
          id="chat-input"
          class="chat-input"
          placeholder="Ayo ceritaaa"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>

        <!-- Mic button -->
        <button class="btn-mic" id="mic-btn" onclick="toggleMic()" title="Voice input">
          <img src="Icon_Button-2.png" alt="mic" style="width: 30px;height:34px;object-fit:contain;mix-blend-mode:multiply;" id="mic-icon" />
        </button>

        <button class="chat-send" id="send-btn" onclick="sendMessage()">↑</button>
      </div>
    </div>
  </div>

</div>

<script>
  const API_URL = "";

  let userName = "";
  let sessionId = crypto.randomUUID();
  let isWaiting = false;

  // ===================== SPEECH RECOGNITION =====================
  let recognition = null;
  let isRecording = false;

  function initSpeechRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return null;

    const rec = new SpeechRecognition();
    rec.lang = 'id-ID';
    rec.continuous = false;
    rec.interimResults = true;

    rec.onstart = () => {
      isRecording = true;
      const btn = document.getElementById('mic-btn');
      btn.classList.add('recording');
      btn.title = 'Tap untuk stop';
      document.getElementById('chat-input').placeholder = 'Dengerin kamu...';
    };

    rec.onresult = (e) => {
      const transcript = Array.from(e.results)
        .map(r => r[0].transcript)
        .join('');
      const input = document.getElementById('chat-input');
      input.value = transcript;
      autoResize(input);
    };

    rec.onend = () => {
      isRecording = false;
      const btn = document.getElementById('mic-btn');
      btn.classList.remove('recording');
      btn.title = 'Voice input';
      document.getElementById('chat-input').placeholder = 'Ayo ceritaaa';

      // Auto send kalau ada teks hasil voice
      const text = document.getElementById('chat-input').value.trim();
      if (text) sendMessage();
    };

    rec.onerror = (e) => {
      isRecording = false;
      const btn = document.getElementById('mic-btn');
      btn.classList.remove('recording');
      btn.title = 'Voice input';
      document.getElementById('chat-input').placeholder = 'Ayo ceritaaa';

      if (e.error === 'not-allowed') {
        addBubble("izin mikrofon ditolak, coba allow dulu di browser yaa", 'joy');
      }
    };

    return rec;
  }

  function toggleMic() {
    if (!recognition) {
      recognition = initSpeechRecognition();
    }

    if (!recognition) {
      addBubble("browser kamu kayaknya ga support voice input dehh, coba pake Chrome yaa", 'joy');
      return;
    }

    if (isRecording) {
      recognition.stop();
    } else {
      recognition.start();
    }
  }

  // ===================== NAVIGATION =====================
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
    document.getElementById('screen-' + name).classList.remove('hidden');
  }

  function startChat() {
    const val = document.getElementById('input-name').value.trim();
    if (!val) {
      document.getElementById('input-name').focus();
      return;
    }

    userName = val;
    localStorage.setItem("userName", userName);
    document.getElementById("chat-greeting").textContent = `Hi ${userName} 👋`;
    sessionId = crypto.randomUUID();

    showScreen('chat');
    sendWelcome();
  }

  // ===================== CHAT =====================
  function sendWelcome() {
    addBubble(`heyy ${userName} 👋 aku Joy, seneng banget bisa ngobrol sama kamu. lagi gimana hari ini?`, 'joy');
  }

  function addBubble(text, sender) {
    const msgs = document.getElementById('chat-messages');
    const typing = document.getElementById('typing-indicator');

    const div = document.createElement('div');
    div.className = `bubble bubble-${sender}`;
    div.textContent = text;

    msgs.insertBefore(div, typing);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function setTyping(show) {
    const el = document.getElementById('typing-indicator');
    const msgs = document.getElementById('chat-messages');
    el.classList.toggle('visible', show);
    if (show) msgs.scrollTop = msgs.scrollHeight;
  }

  async function sendMessage() {
    if (isWaiting) return;
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    autoResize(input);
    addBubble(text, 'user');

    isWaiting = true;
    document.getElementById('send-btn').disabled = true;
    setTyping(true);

    try {
      const res = await fetch(`${API_URL}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          name: userName,
          message: text
        })
      });

      if (!res.ok) throw new Error('server error');
      const data = await res.json();
      setTyping(false);
      addBubble(data.reply, 'joy');

    } catch (err) {
      setTyping(false);
      addBubble("sorry, ada gangguan bentar, coba lagi ya", 'joy');
      console.error(err);
    } finally {
      isWaiting = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }

  async function resetChat() {
    try {
      await fetch(`${API_URL}/reset`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId })
      });
    } catch(e) {}

    sessionId = crypto.randomUUID();
    const msgs = document.getElementById('chat-messages');
    const typing = document.getElementById('typing-indicator');
    [...msgs.children].forEach(el => {
      if (el !== typing) el.remove();
    });
    setTyping(false);
    sendWelcome();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  window.visualViewport?.addEventListener("resize", () => {
    const msgs = document.getElementById("chat-messages");
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  });

  document.addEventListener("focusin", () => {
    setTimeout(() => {
      const msgs = document.getElementById("chat-messages");
      if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }, 300);
  });

  window.addEventListener("load", () => {
    const savedName = localStorage.getItem("userName");
    if (savedName) {
      userName = savedName;
      document.getElementById("chat-greeting").textContent = `Hi ${savedName} 👋`;
      showScreen("chat");
      sendWelcome();
    }
  });

  function fixViewport() {
    const vh = window.visualViewport
      ? window.visualViewport.height
      : window.innerHeight;
    document.querySelector(".phone").style.height = vh + "px";
  }

  fixViewport();
  window.addEventListener("resize", fixViewport);
  window.visualViewport?.addEventListener("resize", fixViewport);
</script>

</body>
</html>
